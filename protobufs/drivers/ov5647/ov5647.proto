syntax = "proto3";

package ov5647;

import "ov5647/frame.proto";

enum RxEnvelopeType {
    ET_FRAMES = 0;

    ET_DEVICE_CONNECTED       = 1;
    ET_DEVICE_RECORDING_START = 3;
    ET_DEVICE_RECORDING_END   = 4;
    ET_DEVICE_DISCONNECTED    = 5;
    ET_ERROR                  = 6;
}

message RxEnvelope {
    RxEnvelopeType   type  = 1;
    frame.FrameStamp stamp = 2; // for all excluding ET_FRAMES

    Camera                camera  = 5;
    repeated CameraFormat formats = 6;
    string                error   = 7;

    bytes last_inference_queue_ptr = 8;

    frame.FramesPack frames = 10;
}

message Camera {
    string id        = 1;
    string name      = 2;
    uint32 width     = 3;
    uint32 height    = 4;
    string unique_id = 8;
}

message CameraFormat {
    uint32 width  = 1;
    uint32 height = 2;
    uint32 fps    = 3;
    string fourcc = 4;
}
